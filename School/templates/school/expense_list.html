{% extends 'base.html' %}
{% load humanize %}

{% block content %}
<div class="p-6 lg:p-12">
    <div class="flex justify-between items-center mb-8">
        <h1 class="text-3xl font-bold text-white">💸 School Expenses</h1>
        <a href="{% url 'school:dashboard' %}" class="glass px-4 py-2 rounded-lg text-rose-400">Dashboard</a>
    </div>

    <div class="glass p-6 mb-8 rounded-2xl border border-rose-500/20">
        <form method="POST" class="grid grid-cols-1 md:grid-cols-4 gap-4">
            {% csrf_token %}
            <input type="text" name="category" placeholder="Category (e.g. Water)" class="bg-white/5 border border-white/10 p-3 rounded-xl text-white" required>
            <input type="number" name="amount" placeholder="Amount (UGX)" class="bg-white/5 border border-white/10 p-3 rounded-xl text-white" required>
            <input type="text" name="description" placeholder="Notes..." class="bg-white/5 border border-white/10 p-3 rounded-xl text-white col-span-1 md:col-span-2">
            <button type="submit" class="bg-rose-600 hover:bg-rose-700 text-white font-bold py-3 rounded-xl transition">LOG EXPENSE</button>
        </form>
    </div>

    <div class="glass rounded-2xl overflow-hidden border border-white/10">
        <table class="w-full text-left">
            <thead class="bg-white/5 text-gray-400">
                <tr>
                    <th class="p-5">Date</th>
                    <th class="p-5">Category</th>
                    <th class="p-5 text-right">Amount (UGX)</th>
                </tr>
            </thead>
            <tbody class="text-gray-200">
                {% for e in expenses %}
                <tr class="border-t border-white/5">
                    <td class="p-5 text-sm text-gray-500">{{ e.date_spent }}</td>
                    <td class="p-5 font-bold">{{ e.category }}</td>
                    <td class="p-5 text-right text-rose-400 font-bold">{{ e.amount|intcomma }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}

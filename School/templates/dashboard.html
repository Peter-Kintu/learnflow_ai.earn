<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>School Management Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 40px; background-color: #f9f9f9; }
        .dashboard-title { margin-bottom: 30px; }
        .card-custom { border-radius: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
        .amount { font-size: 1.5rem; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="dashboard-title text-primary">📊 School Management Dashboard</h1>
        
        <div class="row mb-4">
            <div class="col-md-6">
                <div class="card card-custom p-4">
                    <h3>Fees</h3>
                    <p class="amount text-success">UGX {{ total_fees|floatformat:0|intcomma }}</p>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card card-custom p-4">
                    <h3>Farm Sales</h3>
                    <p class="amount text-success">UGX {{ total_sales|floatformat:0|intcomma }}</p>
                </div>
            </div>
        </div>

        <hr>

        <nav class="mt-3">
            <a href="{% url 'fees_list' %}" class="btn btn-primary me-2">🎓 Student Fees</a>
            <a href="{% url 'farm_list' %}" class="btn btn-success">🐔 Poultry Farms</a>
        </nav>
    </div>
</body>
</html>
